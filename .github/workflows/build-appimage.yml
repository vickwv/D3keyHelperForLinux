name: Build AppImage

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libglib2.0-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            xvfb \
            libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests

      - name: Build AppImage
        env:
          PYTHON_BIN: python
        run: xvfb-run -a ./build_appimage.sh

      - name: Prepare versioned AppImage name
        id: appimage
        run: |
          source_path="build/appimage/D3keyHelper-Linux-x86_64.AppImage"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="$GITHUB_REF_NAME"
          else
            ref_name="${GITHUB_REF_NAME:-manual}"
            safe_ref="$(printf "%s" "$ref_name" | tr -c 'A-Za-z0-9._-' '-')"
            version="${safe_ref}-${GITHUB_SHA::7}"
          fi
          appimage_name="D3keyHelper-Linux-${version}-x86_64.AppImage"
          appimage_path="build/appimage/${appimage_name}"
          cp "$source_path" "$appimage_path"
          echo "name=${appimage_name}" >> "$GITHUB_OUTPUT"
          echo "path=${appimage_path}" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.appimage.outputs.name }}
          path: ${{ steps.appimage.outputs.path }}
          if-no-files-found: error

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          notes=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes" ]; then
            mkdir -p .github/release-notes
            previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
            {
              printf "# D3keyHelperForLinux %s\n\n" "$GITHUB_REF_NAME"
              printf "## Changes\n\n"
              if [ -n "$previous_tag" ]; then
                git log --pretty=format:"- %s (%h)" "${previous_tag}..${GITHUB_REF_NAME}"
              else
                git log --pretty=format:"- %s (%h)" "${GITHUB_REF_NAME}"
              fi
              printf "\n\n## Artifact\n\n- %s\n" "${{ steps.appimage.outputs.name }}"
            } > "$notes"
          fi

      - name: Upload AppImage to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes/${{ github.ref_name }}.md
          files: ${{ steps.appimage.outputs.path }}
