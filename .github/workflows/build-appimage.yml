name: Build AppImage

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libglib2.0-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            xvfb \
            libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests

      - name: Build AppImage
        env:
          PYTHON_BIN: python
        run: xvfb-run -a ./build_appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: D3keyHelper-Linux-x86_64.AppImage
          path: build/appimage/D3keyHelper-Linux-x86_64.AppImage
          if-no-files-found: error

      - name: Upload AppImage to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/appimage/D3keyHelper-Linux-x86_64.AppImage
