<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="820" fill="#f0f2f5"/>

  <style>
    .title { font: 400 14px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #182230; }
    .section { font: 400 13px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #182230; }
    .text { font: 400 13px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #1f2933; }
    .muted { font: 400 12px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #536173; }
    .button { font: 400 12px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #1f2933; }
    .primary { font: 400 12px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #ffffff; }
    .nav { font: 400 13px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #202b3a; }
    .nav-active { font: 400 13px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #174ea6; }
    .status { font: 400 12px "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #344256; }
  </style>

  <!-- App shell -->
  <rect x="24" y="24" width="1232" height="772" rx="8" fill="#ffffff" stroke="#d9dde3"/>

  <!-- Toolbar -->
  <rect x="34" y="34" width="1212" height="44" fill="#ffffff"/>
  <rect x="34" y="43" width="104" height="26" rx="5" fill="none" stroke="#d0d5dc"/>
  <rect x="36" y="45" width="32" height="22" rx="4" fill="#3b6fe8"/>
  <text x="45" y="61" class="primary">简</text>
  <text x="76" y="61" class="button">EN</text>
  <text x="111" y="61" class="button">繁</text>

  <text x="815" y="61" class="muted">激活配置:</text>
  <rect x="884" y="43" width="140" height="28" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="896" y="61" class="text">1 - 配置1</text>

  <rect x="1036" y="43" width="76" height="28" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="1053" y="61" class="button">重新载入</text>
  <rect x="1120" y="43" width="76" height="28" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="1143" y="61" class="button">保存</text>
  <rect x="1204" y="43" width="34" height="28" rx="5" fill="#2f72c4"/>
  <text x="1210" y="61" class="primary">启动</text>

  <!-- Body -->
  <rect x="34" y="86" width="150" height="648" fill="#ffffff"/>
  <rect x="46" y="98" width="126" height="36" rx="6" fill="#dfeafe"/>
  <text x="62" y="121" class="nav-active">通用</text>
  <text x="62" y="164" class="nav">配置1</text>
  <text x="62" y="206" class="nav">配置2</text>
  <text x="62" y="248" class="nav">配置3</text>
  <text x="62" y="290" class="nav">配置4</text>

  <rect x="46" y="650" width="126" height="32" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="88" y="671" class="button">添加</text>
  <rect x="46" y="688" width="126" height="32" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="88" y="709" class="button">删除</text>

  <rect x="194" y="86" width="1052" height="648" fill="#ffffff"/>

  <!-- Page header -->
  <text x="224" y="116" class="title">通用设置</text>
  <text x="224" y="139" class="muted">编辑全局热键、助手行为、输入方式与高级参数</text>
  <line x1="224" y1="156" x2="1218" y2="156" stroke="#e6e9ee"/>

  <!-- Left column -->
  <text x="224" y="188" class="section">基础</text>
  <line x1="224" y1="199" x2="688" y2="199" stroke="#e6e9ee"/>

  <text x="224" y="231" class="text">当前激活配置</text>
  <rect x="404" y="213" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="416" y="231" class="text">1 - 配置1</text>

  <text x="224" y="267" class="text">战斗宏启动方式</text>
  <rect x="404" y="249" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="416" y="267" class="text">键盘按键</text>

  <text x="224" y="303" class="text">战斗宏启动热键</text>
  <rect x="404" y="285" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="416" y="303" class="text">F2</text>

  <text x="224" y="339" class="text">助手启动方式</text>
  <rect x="404" y="321" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="416" y="339" class="text">键盘按键</text>

  <text x="224" y="375" class="text">发送模式</text>
  <rect x="404" y="357" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="416" y="375" class="text">Event</text>

  <rect x="224" y="410" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <path d="M227 418L231 422L238 413" stroke="#1f2933" stroke-width="1.6"/>
  <text x="252" y="423" class="text">宏启动瞬间执行一次</text>

  <rect x="224" y="446" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <path d="M227 454L231 458L238 449" stroke="#1f2933" stroke-width="1.6"/>
  <text x="252" y="459" class="text">只作用于 Diablo III 前台窗口</text>

  <rect x="224" y="482" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <path d="M227 490L231 494L238 485" stroke="#1f2933" stroke-width="1.6"/>
  <text x="252" y="495" class="text">智能暂停</text>

  <!-- Right column -->
  <text x="724" y="188" class="section">助手/输入</text>
  <line x1="724" y1="199" x2="1218" y2="199" stroke="#e6e9ee"/>

  <rect x="724" y="218" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <text x="752" y="231" class="text">自定义强制站立</text>
  <text x="945" y="231" class="muted">按键</text>
  <rect x="996" y="213" width="150" height="26" rx="5" fill="#f8fafc" stroke="#d7dce2"/>
  <text x="1008" y="231" class="muted">LShift</text>

  <rect x="724" y="254" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <text x="752" y="267" class="text">自定义强制移动</text>
  <text x="945" y="267" class="muted">按键</text>
  <rect x="996" y="249" width="150" height="26" rx="5" fill="#f8fafc" stroke="#d7dce2"/>
  <text x="1008" y="267" class="muted">e</text>

  <rect x="724" y="290" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <path d="M727 298L731 302L738 293" stroke="#1f2933" stroke-width="1.6"/>
  <text x="752" y="303" class="text">赌博助手</text>
  <text x="945" y="303" class="muted">点击次数</text>
  <rect x="996" y="285" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="1008" y="303" class="text">15</text>

  <rect x="724" y="326" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <text x="752" y="339" class="text">分解助手</text>
  <text x="945" y="339" class="muted">分解策略</text>
  <rect x="996" y="321" width="150" height="26" rx="5" fill="#f8fafc" stroke="#d7dce2"/>
  <text x="1008" y="339" class="muted">快速分解</text>

  <rect x="724" y="362" width="16" height="16" rx="3" fill="#ffffff" stroke="#8d98a7"/>
  <text x="752" y="375" class="text">重铸助手</text>
  <text x="945" y="375" class="muted">重铸策略</text>
  <rect x="996" y="357" width="150" height="26" rx="5" fill="#f8fafc" stroke="#d7dce2"/>
  <text x="1008" y="375" class="muted">重铸一次</text>

  <text x="724" y="435" class="text">动画速度预设</text>
  <rect x="904" y="417" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="916" y="435" class="text">中等</text>

  <text x="724" y="471" class="text">辅助鼠标速度</text>
  <rect x="904" y="453" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="916" y="471" class="text">2</text>

  <text x="724" y="507" class="text">安全格</text>
  <rect x="904" y="489" width="150" height="26" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="916" y="507" class="muted">61,62,63</text>
  <text x="724" y="540" class="muted">安全格状态：未设置（沿用原版默认值 61,62,63）</text>

  <!-- Status strip -->
  <rect x="34" y="746" width="1212" height="40" fill="#ffffff"/>
  <line x1="34" y1="746" x2="1246" y2="746" stroke="#d9dde3"/>
  <circle cx="54" cy="766" r="5" fill="#2ca36c"/>
  <text x="70" y="771" class="status">运行器：运行中</text>
  <text x="198" y="771" class="status">最近日志</text>
  <text x="272" y="771" class="text">检测到配置变更，已自动重启运行器。</text>
  <rect x="1134" y="754" width="96" height="24" rx="5" fill="#ffffff" stroke="#cfd6df"/>
  <text x="1158" y="771" class="button">展开日志</text>
</svg>
